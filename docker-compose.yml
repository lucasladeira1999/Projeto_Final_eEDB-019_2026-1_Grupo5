x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-bike_user}:${POSTGRES_PASSWORD:-bike_pass}@postgres:5432/${POSTGRES_DB:-bike_elt}
    AIRFLOW__FAB__SECRET_KEY: 'airflow'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'airflow'
    AIRFLOW__WEBSERVER__SESSION_BACKEND: 'securecookie'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__WORKERS: '2'
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: '300'
    AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '300'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_USER: ${POSTGRES_USER:-bike_user}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bike_pass}
    POSTGRES_DB: ${POSTGRES_DB:-bike_elt}
    BRONZE_BASE_URL: ${BRONZE_BASE_URL}
    BRONZE_LISTING_URL: ${BRONZE_LISTING_URL}
    BRONZE_TARGET_MONTHS: ${BRONZE_TARGET_MONTHS}
    AIRFLOW_ALERT_EMAIL: ${AIRFLOW_ALERT_EMAIL:-alerts@example.com}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./great_expectations:/opt/airflow/great_expectations
    - ./dbt_project:/opt/airflow/dbt_project
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    container_name: projeto_final_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bike_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bike_pass}
      POSTGRES_DB: ${POSTGRES_DB:-bike_elt}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bike_user} -d ${POSTGRES_DB:-bike_elt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: projeto_final_airflow_init
    user: "0:0"
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs /opt/airflow/data/raw && \
        chown -R 50000:0 /opt/airflow/logs /opt/airflow/data /opt/airflow/dbt_project && \
        
        su airflow -c "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=$${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN} airflow db migrate" && \
        su airflow -c "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=$${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN} airflow users create \
          --username $${AIRFLOW_USER:-airflow} \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email $${AIRFLOW_ADMIN_EMAIL:-airflow@example.com} \
          --password $${AIRFLOW_PASSWORD:-airflow}"

  airflow-webserver:
    <<: *airflow-common
    container_name: projeto_final_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: projeto_final_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  metabase:
    image: metabase/metabase:latest
    container_name: projeto_final_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: bike_elt
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-bike_user}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-bike_pass}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
