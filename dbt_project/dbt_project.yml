name: "bike_pipeline"
version: "1.0.0"
config-version: 2

profile: "bike_pipeline"

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
packages-install-path: "dbt_packages"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  bike_pipeline:
    staging:
      +schema: silver
      +materialized: table
    gold:
      +schema: gold
      +materialized: table
