bike_pipeline:
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'bike_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'bike_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'bike_elt') }}"
      schema: silver
      threads: 4
  target: dev
